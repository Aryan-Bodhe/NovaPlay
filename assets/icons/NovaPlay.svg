<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Stronger center lighting -->
<radialGradient id="bg" cx="50%" cy="40%" r="75%">
  <stop offset="0%" stop-color="#1D2144"/>
  <stop offset="55%" stop-color="#12152C"/>
  <stop offset="100%" stop-color="#070910"/>
</radialGradient>

<!-- Soft highlight -->
<radialGradient id="highlight" cx="50%" cy="38%" r="55%">
  <stop offset="0%" stop-color="white" stop-opacity="0.10"/>
  <stop offset="100%" stop-color="white" stop-opacity="0"/>
</radialGradient>

<!-- Purple nova gradient -->
<linearGradient id="nova" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#C6A7FF"/>
  <stop offset="100%" stop-color="#6C4DFF"/>
</linearGradient>

</defs>

<!-- Background -->
<rect width="128" height="128" rx="26" fill="url(#bg)"/>

<!-- Center highlight -->
<circle cx="64" cy="56" r="46" fill="url(#highlight)"/>

<!-- Ring -->
<circle
  cx="64"
  cy="64"
  r="48"
  stroke="url(#nova)"
  stroke-width="6"
  fill="none"
/>

<!-- Play -->
<polygon
  points="50,40 92,64 50,88"
  fill="url(#nova)"
/>

</svg>

